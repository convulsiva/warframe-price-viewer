name: Desktop Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
      - "codex/**"
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  tauri:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build desktop app
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            npm run tauri:build -- --config src-tauri/tauri.updater.conf.json --bundles nsis
          else
            npm run tauri:build -- --config src-tauri/tauri.updater.conf.json --bundles app
            ./scripts/package-macos-dmg.sh
          fi

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: warframe-price-viewer-${{ matrix.os }}
          path: src-tauri/target/release/bundle/**

  publish-release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: tauri
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download desktop bundles
        uses: actions/download-artifact@v4
        with:
          pattern: warframe-price-viewer-*
          path: release-input
          merge-multiple: true

      - name: Prepare release notes and updater manifest
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          if [ "v${version}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${version}" >&2
            exit 1
          fi

          notes_path="release-notes/${GITHUB_REF_NAME}.md"
          previous_tag="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          if [ -f "${notes_path}" ]; then
            cp "${notes_path}" release-notes.md
          elif [ -n "${previous_tag}" ]; then
            git log --pretty=format:'- %s' "${previous_tag}..${GITHUB_SHA}" > release-notes.md
          else
            printf '%s\n' "WFMarketTracker ${version}" > release-notes.md
          fi

          node scripts/prepare-updater-release.mjs \
            "${version}" \
            "${GITHUB_REF_NAME}" \
            "${GITHUB_WORKSPACE}/release-input" \
            "${GITHUB_WORKSPACE}/release-assets" \
            "${GITHUB_WORKSPACE}/release-notes.md"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          gh release create "${GITHUB_REF_NAME}" release-assets/* \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --title "WFMarketTracker v${version}" \
            --notes-file release-notes.md
